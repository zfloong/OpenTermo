name: CI

on:
  push:
    branches: [zfl]
    tags: ['Vzfl*']
  pull_request:
    branches: [zfl]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: build & check (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('OpenTermo-fixed/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        run: npm install
        working-directory: OpenTermo-fixed

      - name: Generate Tauri icon set
        run: npx tauri icon src-tauri/icons/icon.png
        working-directory: OpenTermo-fixed

      - name: TypeScript check + Vite build
        run: npm run build
        working-directory: OpenTermo-fixed

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            OpenTermo-fixed/src-tauri/target
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('OpenTermo-fixed/src-tauri/Cargo.toml', 'OpenTermo-fixed/meatshell/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-v2-

      - name: cargo check (Tauri + meatshell, with retry)
        shell: pwsh
        run: |
          $attempt = 0
          while ($true) {
            try {
              cargo check 2>&1 | Out-Host
              if ($LASTEXITCODE -eq 0) { break }
              throw "cargo check exit code: $LASTEXITCODE"
            } catch {
              $attempt++
              if ($attempt -ge 3) { throw }
              Write-Host "Retrying cargo check (attempt $attempt/3) in 15s..."
              Start-Sleep -Seconds 15
            }
          }
        working-directory: OpenTermo-fixed/src-tauri

      - name: Tauri build (with retry)
        shell: pwsh
        run: |
          $attempt = 0
          while ($true) {
            try {
              npx tauri build 2>&1 | Out-Host
              if ($LASTEXITCODE -eq 0) { break }
              throw "tauri build exit code: $LASTEXITCODE"
            } catch {
              $attempt++
              if ($attempt -ge 3) { throw }
              Write-Host "Retrying tauri build (attempt $attempt/3) in 15s..."
              Start-Sleep -Seconds 15
            }
          }
        working-directory: OpenTermo-fixed
        env:
          TAURI_SKIP_DEVSERVER_CHECK: "true"

      - name: List build outputs
        shell: pwsh
        run: |
          Write-Host "=== Bundle dir contents ==="
          if (Test-Path OpenTermo-fixed/src-tauri/target/release/bundle/) {
            Get-ChildItem -Recurse OpenTermo-fixed/src-tauri/target/release/bundle/ -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Host "(no bundle directory)"
          }
          Write-Host "=== Exe ==="
          Get-ChildItem OpenTermo-fixed/src-tauri/target/release/*.exe -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
          Write-Host "=== Target release root ==="
          Get-ChildItem OpenTermo-fixed/src-tauri/target/release/ -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/Vzfl')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            OpenTermo-fixed/src-tauri/target/release/bundle/msi/*.msi
            OpenTermo-fixed/src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: opentermo-win64
          path: |
            OpenTermo-fixed/src-tauri/target/release/bundle/msi/*.msi
            OpenTermo-fixed/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 7